<div id="worksViewer" class="works-viewer">
  <span class="close" onclick="closeWorksViewer()">×</span>
  <button class="arrow left" onclick="changeWork(-1)">‹</button>
  <img id="worksViewerImg">
  <button class="arrow right" onclick="changeWork(1)">›</button>
</div>

<script>
  const workImages = [
    "images/Maiya Mason Looking Away.png",
    "images/work2.jpg",
    "images/work3.jpg"
  ];

  let currentWork = 0;

  function openWorksViewer(index) {
    currentWork = index;
    document.getElementById("worksViewerImg").src = workImages[currentWork];
    document.getElementById("worksViewer").style.display = "flex";
  }

  function closeWorksViewer() {
    document.getElementById("worksViewer").style.display = "none";
  }

  function changeWork(direction) {
    currentWork += direction;

    if (currentWork < 0) {
      currentWork = workImages.length - 1;
    }

    if (currentWork >= workImages.length) {
      currentWork = 0;
    }

    document.getElementById("worksViewerImg").src = workImages[currentWork];
  }
</script>
